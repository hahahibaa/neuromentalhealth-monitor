<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroHealth Dashboard</title>

  <!-- CDNs for React and dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --deep-indigo: #0B0C10;
      --soft-teal: #1F2833;
      --vibrant-mint: #66FCF1;
      --text-main: #C5C6C7;
      --text-muted: #45A29E;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--deep-indigo);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Background Image */
    .bg-color {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -3;
      background: var(--deep-indigo);
    }

    .bg-animated {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      background: url('./bg_transparent.png') no-repeat center center;
      background-size: 75vh;
      opacity: 0.15;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: radial-gradient(circle, rgba(11, 12, 16, 0.2) 0%, rgba(11, 12, 16, 0.85) 100%);
    }

    /* Glassmorphism Classes */
    .glass {
      background: rgba(22, 33, 62, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .glass-strong {
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.3s ease-in-out;
    }

    .btn-primary {
      background: var(--vibrant-mint);
      color: var(--deep-indigo);
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(102, 252, 241, 0.2);
    }

    .btn-primary:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(102, 252, 241, 0.5);
    }

    .btn-icon {
      background: transparent;
      color: white;
      transition: all 0.3s ease;
    }

    .btn-icon:hover {
      transform: scale(1.1);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
    }

    /* Links Hover Effects */
    .nav-link {
      color: var(--text-muted);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* Utility */
    .text-accent {
      color: var(--vibrant-mint);
      text-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
    }

    /* Recommendations Cards */
    .card-hover-lift {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    }

    .card-hover-lift:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .gauge-container {
      position: relative;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(var(--vibrant-mint) 85%, rgba(255, 255, 255, 0.1) 85%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(102, 252, 241, 0.2);
    }

    .gauge-inner {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--soft-teal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Layout */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 2rem;
    }

    /* Bar Chart Component CSS */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 150px;
    }

    .bar {
      width: 30px;
      background: linear-gradient(to top, rgba(102, 252, 241, 0.1), var(--vibrant-mint));
      border-radius: 6px 6px 0 0;
      transition: height 1s ease-out;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .alert-mode {
      box-shadow: inset 0 0 200px rgba(239, 68, 68, 0.15);
      transition: box-shadow 0.5s ease-in-out;
    }

    .vignette-pulse {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 100;
      background: radial-gradient(circle, transparent 50%, rgba(255, 77, 0, 0.15) 100%);
      animation: vignetteBreathe 2s infinite alternate;
    }

    @keyframes vignetteBreathe {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }

    /* Slider styling */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      height: 24px;
      width: 24px;
      border-radius: 50%;
      background: var(--vibrant-mint);
      cursor: pointer;
      margin-top: -10px;
      box-shadow: 0 0 10px var(--vibrant-mint);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <!-- Temporary Error Injection to catch Babel crashes on screen -->
  <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; z-index:99999; background:red; color:white; padding:20px; font-family:monospace; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
      <h2 style="margin-top:0;">🛑 Script Error Detected</h2>
      <pre id="error-msg" style="white-space: pre-wrap; font-size:16px; margin-top:10px;"></pre>
      <button onclick="document.getElementById('error-overlay').style.display='none'" style="margin-top:10px; padding:8px 16px; background:white; color:red; border:none; cursor:pointer;">Dismiss</button>
  </div>
  <script>
    window.addEventListener('error', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-msg').textContent = e.message + '\n\nSource: ' + e.filename + '\nLine: ' + e.lineno + ' Col: ' + e.colno;
    });
    // Catch unhandled promise rejections (often where Babel errors surface if async loaded)
    window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-msg').textContent = "Unhandled Promise Rejection:\n" + (e.reason && e.reason.message ? e.reason.message : e.reason) + "\n\nStack:\n" + (e.reason && e.reason.stack ? e.reason.stack : '');
    });
  </script>

  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- Icons ---
    const IconActivity = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const IconMenu = () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
    const IconX = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconBrain = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2h5A4.5 4.5 0 0 1 19 6.5v0A4.5 4.5 0 0 1 14.5 11h-5A4.5 4.5 0 0 1 5 6.5v0A4.5 4.5 0 0 1 9.5 2Z" /><path d="M12 11v8" /><path d="M12 19H8" /><path d="M12 19h4" /></svg>;
    const IconHistory = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconSettings = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const IconHome = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    
    // --- FFT Math Engine ---
    // A simplified pure JS FFT magnitude estimator for the frequency spectrum.
    // In production, use `dsp.js` or similar fast C-bindings via WASM.
    const computeFFTMagnitudes = (buffer, sampleRate = 250) => {
        const N = buffer.length;
        if (N === 0) return { powers: { delta: 10, theta: 10, alpha: 10, beta: 10 }, bins: [] };

        // 1. Hann Windowing to reduce spectral leakage
        const windowed = new Array(N);
        for (let i = 0; i < N; i++) {
            windowed[i] = buffer[i] * (0.5 * (1 - Math.cos((2 * Math.PI * i) / (N - 1))));
        }

        // 2. Discrete Fourier Transform (DFT) - Note: Inefficient O(N^2), but fine for small N (e.g., 64 or 128)
        const magnitudes = new Array(Math.floor(N / 2)).fill(0);
        for (let k = 0; k < magnitudes.length; k++) {
            let re = 0, im = 0;
            for (let n = 0; n < N; n++) {
                const angle = (2 * Math.PI * k * n) / N;
                re += windowed[n] * Math.cos(angle);
                im -= windowed[n] * Math.sin(angle);
            }
            magnitudes[k] = Math.sqrt(re * re + im * im) / N;
        }

        // 3. Bucket frequencies
        const df = sampleRate / N; // Frequency resolution per bin
        let powers = { delta: 0, theta: 0, alpha: 0, beta: 0 };
        
        // Accumulate bins into standard EEG frequency bands
        for (let k = 1; k < magnitudes.length; k++) {
            const freq = k * df;
            const mag = magnitudes[k];
            if (freq >= 1 && freq <= 4) powers.delta += mag;
            else if (freq > 4 && freq <= 8) powers.theta += mag;
            else if (freq > 8 && freq <= 14) powers.alpha += mag;
            else if (freq > 14 && freq <= 30) powers.beta += mag;
        }

        return { powers, bins: magnitudes.map((m, i) => ({ freq: i * df, mag: m })) };
    };

    // --- State and Logic Classifications ---
    const getCognitiveState = (powers, mode = 'student') => {
        const total = powers.delta + powers.theta + powers.alpha + powers.beta || 1;
        
        // 1. Focus Ratio Math (Alpha / (Alpha + Theta))
        const denomFocus = (powers.alpha + powers.theta) || 1;
        const focusRatio = powers.alpha / denomFocus;
        
        // 2. Stress Index Math (Beta / (Alpha + Theta) * 100)
        let stressIndex = Math.round((powers.beta / denomFocus) * 40); // Scaled multiplier for 0-100 range
        stressIndex = Math.min(100, Math.max(0, stressIndex));

        // Return unified state object with both student and pro resolved states
        let studentState = { id: "NEUTRAL", label: "Neutral", color: "#FFFFFF", isDistracted: false, isFocused: false };
        if (focusRatio > 0.6) studentState = { id: "CALM", label: "Highly Focused", color: "#00F2FF", isDistracted: false, isFocused: true };
        else if (focusRatio < 0.4) studentState = { id: "DISTRACTED", label: "Distracted", color: "#FF4D00", isDistracted: true, isFocused: false };

        const proClass = getStressClassification(stressIndex);
        let proState = { id: proClass.state.toUpperCase().replace(' ', '_'), label: proClass.state, color: proClass.color, index: stressIndex, isStressed: stressIndex > 60 };

        return { ...powers, focusRatio, stressIndex, student: studentState, pro: proState };
    };

    const getClassificationColor = (val) => getStressClassification(val).color;

    const getStressClassification = (stress) => {
        if (stress <= 40) return { state: 'Deep Relaxation', color: '#00F2FF', rec: 'Optimal state. Maintain current workflow.' };
        if (stress <= 60) return { state: 'Neutral Baseline', color: '#FFFFFF', rec: 'Approaching fatigue. Consider a 5-minute break soon.' };
        if (stress <= 80) return { state: 'Elevated Stress', color: '#EAB308', rec: 'High cognitive load. Switch to lower-bandwidth tasks.' };
        return { state: 'Severe Stress', color: '#FF4D00', rec: 'CRITICAL: Initiate 15-min guided recovery protocol immediately.' };
    };

    // --- Mock Data ---
    const mockData = [
      { date: "2026-03-10", avgStress: 18, bands: { alpha: 45, beta: 10, theta: 35, delta: 10 } },
      { date: "2026-03-11", avgStress: 55, bands: { alpha: 25, beta: 40, theta: 20, delta: 15 } },
      { date: "2026-03-12", avgStress: 88, bands: { alpha: 10, beta: 70, theta: 10, delta: 10 } }
    ].map(d => ({ ...d, ...getStressClassification(d.avgStress) }));

    const generateOrgData = () => {
      const users = [];
      for (let i = 0; i < 50; i++) {
        let stress = Math.floor(Math.random() * 70) + 15;
        if(Math.random() > 0.85) stress += 25; 
        if(stress > 100) stress = 100;

        users.push({
          id: `User_${Math.floor(1000 + Math.random() * 9000).toString().substring(1)}`,
          stress: stress,
          ...getStressClassification(stress)
        });
      }
      return users;
    };
    const orgMockData = generateOrgData();

    // --- Hardware Connection Hook ---
    const useHardwareConnection = (onDisconnectCallback) => {
      const [isConnected, setIsConnected] = useState(false);
      const [isSimulation, setIsSimulation] = useState(false);
      const [toast, setToast] = useState(null);
      
      const [simFreq, setSimFreq] = useState(10); // Hz slider overlay 
      
      // Live raw array buffering 64 samples at a time
      const [rawBuffer, setRawBuffer] = useState(Array(64).fill(512));
      // Live calculated FFT powers & magnitude bins
      const [fftData, setFftData] = useState({ powers: { delta: 10, theta: 10, alpha: 10, beta: 10 }, bins: [] });
      
      // Session tracking log: Array of states recorded every 1 second
      const [sessionLog, setSessionLog] = useState([]);
      const sessionRef = useRef([]); // ref for interval access
      
      const fftDataRef = useRef(fftData);
      useEffect(() => {
          fftDataRef.current = fftData;
      }, [fftData]);

      // Push state to active session log every 1 second
      useEffect(() => {
          if (!isConnected) return;
          const timer = setInterval(() => {
             const state = getCognitiveState(fftDataRef.current.powers);
             // Append to both ref and state
             sessionRef.current = [...sessionRef.current, { time: Date.now(), ...state }];
             setSessionLog(sessionRef.current);
          }, 1000);
          return () => clearInterval(timer);
      }, [isConnected]);

      // Offline Simulator (Fires if hardware not attached)
      useEffect(() => {
          if (!isSimulation) return;
          const simTimer = setInterval(() => {
              // Synthetic wave simulation based on the slider
              const N = 64;
              let newBuffer = [];
              const t0 = Date.now() / 1000;
              
              const noiseAmp = simFreq > 14 ? 5 : 15; 
              
              for (let i = 0; i < N; i++) {
                 const t = t0 + (i * 0.004); // 250Hz dt
                 
                 // Main driven frequency from slider (1-30Hz)
                 const baseWave = Math.sin(2 * Math.PI * simFreq * t) * 150;
                 
                 // Specific mock overrides for the Focus/Stress Math
                 // If the user wants 10Hz (calm), we explicitly reduce Theta (4-8) so FocusRatio > 0.6
                 // If the user wants 4Hz (distracted), we push Theta high so FocusRatio < 0.4
                 let extraTheta = 0;
                 if (simFreq <= 8) extraTheta = Math.sin(2 * Math.PI * 6 * t) * 100;

                 const randomNoise = (Math.random() - 0.5) * noiseAmp;
                 newBuffer.push(512 + baseWave + extraTheta + randomNoise);
              }
              setRawBuffer(newBuffer);
              setFftData(computeFFTMagnitudes(newBuffer, 250));
          }, 250); // Buffer refresh 4x second
          return () => clearInterval(simTimer);
      }, [isSimulation, simFreq]);

      const connect = async () => {
        setSessionLog([]);
        sessionRef.current = [];
        try {
          if ('serial' in navigator) {
            // Attempt hardware connection
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            setIsConnected(true);
            setIsSimulation(false);
            setToast("Hardware Connected Successfully");
            
            // Background async loop to read Serial Stream from ESP8266
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();
            
            let valBuffer = [];
            
            const readLoop = async () => {
              try {
                while (true) {
                  const { value, done } = await reader.read();
                  if (done) break;
                  
                  // Value is a raw analog int (0-1023) followed by \n.
                  const parts = value.split('\n');
                  parts.forEach(p => {
                      const num = parseInt(p.trim(), 10);
                      if (!isNaN(num)) valBuffer.push(num);
                  });
                  
                  // Once we have a chunk (64 samples), process FFT
                  if (valBuffer.length >= 64) {
                      const chunk = valBuffer.slice(0, 64);
                      setRawBuffer(chunk);
                      setFftData(computeFFTMagnitudes(chunk, 250));
                      valBuffer = valBuffer.slice(64); // Keep remainder
                  }
                }
              } catch (e) {
                console.error("Serial read err:", e);
              } finally {
                reader.releaseLock();
              }
            };
            readLoop();

          } else {
            throw new Error("Web Serial API not supported");
          }
        } catch (err) {
          console.warn("Hardware connection failed/timed out, falling back to Simulation", err);
          // Fallback to simulation after failure or 5s timeout
          setTimeout(() => {
            setIsConnected(true);
            setIsSimulation(true);
            setToast("Hardware Disconnected: Entering Simulation Mode");
            setTimeout(() => setToast(null), 4000);
          }, 1000); 
        }
      };

      const disconnectAndReport = async () => {
         setIsConnected(false);
         setIsSimulation(false);
         // Invoke callback, passing the recorded session log to the Report Page
         if (onDisconnectCallback) onDisconnectCallback(sessionRef.current);
      };

      return { isConnected, isSimulation, rawBuffer, fftData, sessionLog, simFreq, setSimFreq, connect, disconnectAndReport, toast };
    };

    // --- Components ---

    const Toast = ({ message }) => (
      <motion.div 
        initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 50 }}
        style={{ position: 'fixed', bottom: '30px', left: '50%', transform: 'translateX(-50%)', background: '#EF4444', color: 'white', padding: '12px 24px', borderRadius: '8px', zIndex: 1000, fontWeight: 600, boxShadow: '0 4px 15px rgba(239, 68, 68, 0.4)' }}
      >
        {message}
      </motion.div>
    );

    const Onboarding = ({ onConnect, onSelectMode }) => {
      const [connecting, setConnecting] = useState(false);
      const [showModes, setShowModes] = useState(false);

      const handleConnect = async () => {
        setConnecting(true);
        await onConnect();
        setConnecting(false);
        setShowModes(true);
      };

      return (
        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', textAlign: 'center' }}>
          <h1 style={{ fontSize: '4.5rem', fontWeight: 800, marginBottom: '1rem', letterSpacing: '-1px' }}>
            Welcome to Neuro<span className="text-accent">Health</span>
          </h1>
          
          {!showModes ? (
            <React.Fragment>
              <p style={{ fontSize: '1.25rem', color: 'var(--text-muted)', marginBottom: '3rem' }}>Please wear your EEG Headset to begin.</p>
              <button className="btn-primary" onClick={handleConnect} disabled={connecting} style={{ fontSize: '1.2rem', padding: '16px 32px' }}>
                {connecting ? 'Connecting...' : 'Connect to Band'}
              </button>

      const [rotation, setRotation] = useState({ x: 0, y: 0 });

      const handleMouseMove = (e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Calculate rotation between -10 and 10 degrees
        const multiplier = 20;
        const rX = ((y / rect.height) - 0.5) * -multiplier;
        const rY = ((x / rect.width) - 0.5) * multiplier;

        setRotation({ x: rX, y: rY });
      };

      const handleMouseLeave = () => {
        setRotation({ x: 0, y: 0 });
      };

      return (
        <motion.div
          ref={cardRef}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          animate={{ rotateX: rotation.x, rotateY: rotation.y }}
          transition={{ type: "spring", stiffness: 300, damping: 20 }}
          style={Object.assign({ perspective: 1000, transformStyle: "preserve-3d" }, style || {})}

            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { 
                x: { ticks: { color: '#45A29E', maxTicksLimit: 8 }, grid: { display: false } }, 
                y: { min: 0, max: 300, ticks: { display: false } } 
            },
            plugins: { legend: { display: false } }
          }
        });
        return () => freqChart.current?.destroy();
      }, []);

      // Live Update Hooks
      useEffect(() => {
         if (rawChart.current && rawBuffer) {
           rawChart.current.data.datasets[0].data = rawBuffer;
           rawChart.current.update();
         }
      }, [rawBuffer]);

      useEffect(() => {
         if (freqChart.current && fftData && fftData.bins) {
           freqChart.current.data.datasets[0].data = fftData.bins.map(b => b.mag);
           freqChart.current.update();
         }
      }, [fftData]);

      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '1rem', height: '100%', minHeight: 0 }}>
          <div className="glass" style={{ flex: 1, padding: '1rem', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
             <h3 style={{ fontSize: '1rem', color: '#E2E8F0', paddingBottom: '0.5rem' }}>Raw Time-Domain Signal</h3>
             <div style={{ flex: 1, position: 'relative' }}><canvas ref={rawRef}></canvas></div>
          </div>
          <div className="glass" style={{ flex: 1, padding: '1rem', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
             <h3 style={{ fontSize: '1rem', color: '#E2E8F0', paddingBottom: '0.5rem' }}>FFT Frequency Spectrum</h3>
             <div style={{ flex: 1, position: 'relative' }}><canvas ref={freqRef}></canvas></div>
          </div>
        </div>
      );
    };

    const StudentMode = ({ fftData, rawBuffer, sessionLog }) => {
      const currentState = getCognitiveState(fftData.powers);
      const { student } = currentState;

      // Calculate totals from session log manually using the updated nested state structure
      const focusTicks = sessionLog.filter(s => s.student?.isFocused).length;
      const distractTicks = sessionLog.filter(s => s.student?.isDistracted).length;
      const total = focusTicks + distractTicks || 1;
      const score = Math.round((focusTicks / total) * 100) || 0;

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          {/* Vignette Overlay for Distraction */}
          {student.isDistracted && <div className="vignette-pulse"></div>}

          <div style={{ marginBottom: '2rem' }}>
            <h2 style={{ fontSize: '2.5rem', fontWeight: 800, color: '#00F2FF', marginBottom: '0.5rem' }}>Student Mode: Focus Tracking</h2>
            <p style={{ color: '#94A3B8', fontSize: '1.1rem' }}>Monitoring Focus Ratio (Alpha / Alpha + Theta).</p>
          </div>

          <div style={{ display: 'flex', gap: '2rem', flex: 1 }}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                <DualChart rawBuffer={rawBuffer} fftData={fftData} />
            </div>

            <div className="glass" style={{ width: '350px', padding: '2.5rem', display: 'flex', flexDirection: 'column', justifyContent: 'flex-start' }}>
               <h3 style={{ fontSize: '1.5rem', color: 'var(--text-muted)' }}>Current State</h3>
               <div style={{ 
                 fontSize: '2.5rem', fontWeight: 800, marginTop: '1rem', marginBottom: '2rem',
                 color: student.color,
                 textShadow: `0 0 20px ${student.color}` 
               }}>
                 {student.label}
               </div>
               
               <h3 style={{ fontSize: '1.5rem', color: 'var(--text-muted)', marginBottom: '1.5rem' }}>Session Metrics</h3>
               <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem', fontSize: '1.2rem' }}>
                 <span style={{ color: '#059669' }}>Time Focused:</span>
                 <span style={{ fontWeight: 700 }}>{Math.floor(focusTicks / 60)}m {focusTicks % 60}s</span>
               </div>
               <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '2rem', fontSize: '1.2rem' }}>
                 <span style={{ color: '#EF4444' }}>Time Distracted:</span>
                 <span style={{ fontWeight: 700 }}>{Math.floor(distractTicks / 60)}m {distractTicks % 60}s</span>
               </div>
               <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '2rem' }}>
                 <span style={{ fontSize: '1.2rem', color: 'var(--text-main)' }}>Concentration Score: </span>
                 <div style={{ fontSize: '3rem', fontWeight: 800, color: '#66FCF1' }}>{score}%</div>
               </div>
            </div>
          </div>
        </div>
      );
    };

    const ProfessionalMode = ({ fftData, rawBuffer, sessionLog }) => {
      const currentState = getCognitiveState(fftData.powers);
      const { pro } = currentState;
      
      const showRecommendation = sessionLog.length > 10 && 
           sessionLog.slice(-10).every(s => s.pro?.isStressed); 

      // Calculate totals from session log manually using the updated nested state structure
      const focusTicks = sessionLog.filter(s => s.student?.isFocused).length; // Map to the student calm state for baseline focus tracking
      const distractTicks = sessionLog.filter(s => s.pro?.isStressed).length; // Map to professional stress state
      const total = sessionLog.length || 1;
      const score = Math.round((focusTicks / total) * 100) || 0;

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          {pro.isStressed && <div className="vignette-pulse"></div>}

          <div style={{ marginBottom: '2rem' }}>
            <h2 style={{ fontSize: '2.5rem', fontWeight: 800, color: '#F97316', marginBottom: '0.5rem' }}>Professional Mode: Workload Tracking</h2>
            <p style={{ color: '#94A3B8', fontSize: '1.1rem' }}>Live FFT pipeline assessing raw cognitive load [Stress Index: {pro.index}].</p>
          </div>

          <AnimatePresence>
            {showRecommendation && (
              <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}
                style={{ background: 'rgba(239, 68, 68, 0.2)', border: '1px solid #EF4444', padding: '1rem', borderRadius: '8px', marginBottom: '1.5rem', color: 'white' }}>
                <strong>Critical Break Required:</strong> High sustained beta wave stress detected. Disconnect headset and initiate 5-minute cognitive reset.
              </motion.div>
            )}
          </AnimatePresence>

          <div style={{ display: 'flex', gap: '2rem', flex: 1 }}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                <DualChart rawBuffer={rawBuffer} fftData={fftData} />
            </div>
            
            <div className="glass" style={{ width: '350px', padding: '2.5rem', display: 'flex', flexDirection: 'column', justifyContent: 'flex-start' }}>
               <h3 style={{ fontSize: '1.5rem', color: 'var(--text-muted)' }}>Current State</h3>
               <div style={{ 
                 fontSize: '2.5rem', fontWeight: 800, marginTop: '1rem', marginBottom: '2rem',
                 color: pro.color,
                 textShadow: `0 0 20px ${pro.color}` 
               }}>
                 {pro.label}
               </div>
               
               <h3 style={{ fontSize: '1.5rem', color: 'var(--text-muted)', marginBottom: '1.5rem' }}>Session Metrics</h3>
               <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem', fontSize: '1.2rem' }}>
                 <span style={{ color: '#059669' }}>Time Deep Relaxed:</span>
                 <span style={{ fontWeight: 700 }}>{Math.floor(focusTicks / 60)}m {focusTicks % 60}s</span>
               </div>
               <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '2rem', fontSize: '1.2rem' }}>
                 <span style={{ color: '#EF4444' }}>Time Stressed:</span>
                 <span style={{ fontWeight: 700 }}>{Math.floor(distractTicks / 60)}m {distractTicks % 60}s</span>
               </div>
               <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '2rem' }}>
                 <span style={{ fontSize: '1.2rem', color: 'var(--text-main)' }}>Relaxation Score: </span>
                 <div style={{ fontSize: '3rem', fontWeight: 800, color: '#00F2FF' }}>{score}%</div>
               </div>
            </div>
          </div>
        </div>
      );
    };

    const ReportPage = ({ log }) => {
       const counts = { CALM: 0, SLIGHT_MOVEMENT: 0, DISTRACTED: 0 };
       log.forEach(s => counts[s.id] = (counts[s.id] || 0) + 1);
       const total = log.length || 1;
       const duration = `${Math.floor(log.length / 60)}m ${log.length % 60}s`;

       return (
          <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} style={{ padding: '2rem', height: '100%' }}>
             <h2 style={{ fontSize: '3rem', fontWeight: 800, marginBottom: '2rem', color: '#C5C6C7' }}>End of Session Report</h2>
             <div style={{ display: 'flex', gap: '2rem' }}>
                <div className="glass" style={{ flex: 1, padding: '3rem' }}>
                   <h3 style={{ fontSize: '1.5rem', marginBottom: '2rem' }}>Time Distribution ({duration})</h3>
                   <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                      <div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', color: '#059669', fontWeight: 700, marginBottom: '0.5rem' }}><span>Calm Focus</span> <span>{Math.round((counts.CALM/total)*100)}%</span></div>
                        <div style={{ height: '12px', background: 'rgba(5,150,105,0.2)', borderRadius: '6px' }}>
                           <div style={{ height: '100%', width: `${(counts.CALM/total)*100}%`, background: '#059669', borderRadius: '6px' }}></div>
                        </div>
                      </div>
                      <div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', color: '#EAB308', fontWeight: 700, marginBottom: '0.5rem' }}><span>Slight Movement / Artifacts</span> <span>{Math.round((counts.SLIGHT_MOVEMENT/total)*100)}%</span></div>
                        <div style={{ height: '12px', background: 'rgba(234,179,8,0.2)', borderRadius: '6px' }}>
                           <div style={{ height: '100%', width: `${(counts.SLIGHT_MOVEMENT/total)*100}%`, background: '#EAB308', borderRadius: '6px' }}></div>
                        </div>
                      </div>
                      <div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', color: '#EF4444', fontWeight: 700, marginBottom: '0.5rem' }}><span>Distracted / Stressed</span> <span>{Math.round((counts.DISTRACTED/total)*100)}%</span></div>
                        <div style={{ height: '12px', background: 'rgba(239,68,68,0.2)', borderRadius: '6px' }}>
                           <div style={{ height: '100%', width: `${(counts.DISTRACTED/total)*100}%`, background: '#EF4444', borderRadius: '6px' }}></div>
                        </div>
                      </div>
                   </div>
                </div>
                <div className="glass" style={{ flex: 1, padding: '3rem', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center' }}>
                   <div style={{ padding: '20px', background: 'rgba(102, 252, 241, 0.1)', borderRadius: '50%', color: 'var(--vibrant-mint)', marginBottom: '1rem' }}>
                      <IconBrain />
                   </div>
                   <h3 style={{ fontSize: '1.5rem', marginBottom: '1rem' }}>Session Synced to Cloud</h3>
                   <p style={{ color: 'var(--text-muted)' }}>Your raw telemetry and FFT outputs have been saved to your lifetime analytics portal.</p>
                </div>
             </div>
          </motion.div>
       );
    };

    const App = () => {
      const [finalLog, setFinalLog] = useState([]);
      const { isConnected, isSimulation, rawBuffer, fftData, sessionLog, simFreq, setSimFreq, connect, disconnectAndReport, toast } = useHardwareConnection((log) => {
          setFinalLog(log);
          setNavPage('report');
      });
      const [appState, setAppState] = useState('onboarding'); // 'onboarding', 'student', 'professional'
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [navPage, setNavPage] = useState('home'); // which page is active in the dashboard

      if (appState === 'onboarding') {
        return (
          <div className="app-container" style={{ justifyContent: 'center' }}>
            <div className="bg-animated"></div>
            <div className="bg-overlay"></div>
            <div style={{ zIndex: 10, width: '100%' }}>
              <Onboarding 
                onConnect={connect} 
                onSelectMode={(mode) => {
                  setAppState(mode);
                  setNavPage('live');
                }} 
              />
            </div>
            {toast && <Toast message={toast} />}
          </div>
        );
      }

      // Check stress state for global background shifts + recommendation triggers
      const currentState = getCognitiveState(fftData.powers);
      const isDistressed = currentState.pro.isStressed;

      return (
        <div className="app-container" style={{ transition: 'background 0.5s ease' }}>
          {/* Dynamic background swap based on mode and stress level */}
          <div className="bg-animated"></div>
          <div className="bg-overlay" style={{ background: isDistressed ? 'radial-gradient(circle, rgba(255, 77, 0, 0.1) 0%, rgba(11, 12, 16, 0.95) 100%)' : 'radial-gradient(circle, rgba(11, 12, 16, 0.2) 0%, rgba(11, 12, 16, 0.85) 100%)', transition: 'background 1s ease' }}></div>

          <Sidebar isOpen={sidebarOpen} setIsOpen={setSidebarOpen} currentPage={navPage} setCurrentPage={setNavPage} appState={appState} />

          <div className="main-content">
            <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', maxWidth: '1400px', margin: '0 auto 2rem auto' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                <button onClick={() => setSidebarOpen(true)} className="btn-icon">
                  <IconMenu />
                </button>
                <div style={{ padding: '6px 16px', borderRadius: '20px', background: isSimulation ? 'rgba(249, 115, 22, 0.2)' : 'rgba(102, 252, 241, 0.2)', color: isSimulation ? '#F97316' : '#66FCF1', fontWeight: 600, fontSize: '0.85rem' }}>
                  {isSimulation ? 'SIMULATION MODE' : 'HARDWARE CONNECTED'}
                </div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: '1.5rem' }}>
                <button className="btn-icon" onClick={disconnectAndReport} style={{ background: 'rgba(239, 68, 68, 0.2)', color: '#EF4444', padding: '8px 16px', borderRadius: '12px', border: '1px solid #EF4444', fontSize: '0.9rem', fontWeight: 700 }}>
                  Disconnect & End Session
                </button>
                <div style={{ width: '45px', height: '45px', borderRadius: '50%', background: 'var(--text-muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold', fontSize: '1.2rem', boxShadow: '0 4px 15px rgba(69, 162, 158, 0.4)', cursor: 'pointer', color: 'var(--deep-indigo)' }}>
                  U
                </div>
              </div>
            </header>

            {isSimulation && (
              <div style={{ maxWidth: '1400px', margin: '0 auto 2rem auto', padding: '1.5rem', background: 'rgba(255,255,255,0.05)', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem' }}>
                  <h4 style={{ color: 'var(--text-main)', margin: 0 }}>Dev-Menu: Frequency Simulator</h4>
                  <span style={{ color: 'var(--vibrant-mint)', fontWeight: 700 }}>{simFreq} Hz</span>
                </div>
                <input 
                  type="range" 
                  min="0" max="40" 
                  value={simFreq} 
                  onChange={(e) => setSimFreq(Number(e.target.value))} 
                />
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '0.5rem', fontSize: '0.8rem', color: 'var(--text-muted)' }}>
                  <span>0 Hz (Deep Relax)</span>
                  <span>14 Hz (Borderline)</span>
                  <span>40 Hz (Severe Stress)</span>
                </div>
              </div>
            )}

            <div style={{ maxWidth: '1400px', margin: '0 auto', height: 'calc(100% - 220px)', position: 'relative' }}>
              <AnimatePresence mode="wait">
                {navPage === 'home' && (
                  <motion.div key="home" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }} style={{ height: '100%' }}>
                    <Home setCurrentPage={setNavPage} />
                  </motion.div>
                )}
                {navPage === 'live' && (
                  <motion.div key="live" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} style={{ height: '100%' }}>
                     {appState === 'student' ? <StudentMode fftData={fftData} rawBuffer={rawBuffer} sessionLog={sessionLog} /> : <ProfessionalMode fftData={fftData} rawBuffer={rawBuffer} sessionLog={sessionLog} />}
                  </motion.div>
                )}
                {navPage === 'report' && <ReportPage log={finalLog} key="report" />}
                {navPage === 'lifetime' && <LifetimeAnalytics key="lifetime" />}
                {navPage === 'sessions' && <PreviousSessions key="sessions" />}
                {navPage === 'recs' && <NeuroCoach key="recs" simulateStress={isDistressed} />}
                {navPage === 'admin' && <AdminDashboard key="admin" />}
              </AnimatePresence>
            </div>

            <footer style={{ marginTop: '2rem', padding: '1rem', textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.85rem' }}>
              Disclaimer: Results are an estimation based on EEG signals and not a medical diagnosis.
            </footer>
          </div>

          {toast && <Toast message={toast} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
